services:
  backend:
    image: ghcr.io/runzhliu/welink/backend:main
    build:
      context: ./backend
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    container_name: welink-backend
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      # ⚠ 启动前请确认宿主机仓库根目录下 decrypted/ 存在，且包含
      #   contact/contact.db 和 message/message_*.db。
      #   如果 ./decrypted 不存在，docker compose 会**自动创建一个空目录**
      #   并挂上去 —— 此时容器看起来正常启动，但 WeLink 会展示
      #   「未找到 WeChat 解密数据」引导页（前端持续轮询直到数据就位）。
      #   可在容器内验证：docker compose exec backend ls -la /app/data
      - ./decrypted:/app/data
      - welink-prefs:/app/prefs
    environment:
      - GIN_MODE=release
      - PREFERENCES_PATH=/app/prefs/preferences.json
    # 让容器内能通过 host.docker.internal 访问宿主机上的服务
    # （例如本机 docker run 的 openai-edge-tts:5050，或 Ollama:11434）。
    # macOS / Windows Docker Desktop / OrbStack 默认就支持；这里加 extra_hosts
    # 让 Linux Docker Engine 也能用，不需要用户改 network_mode。
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: ghcr.io/runzhliu/welink/frontend:main
    build: ./frontend
    container_name: welink-frontend
    ports:
      - "0.0.0.0:3418:80"
    depends_on:
      - backend

volumes:
  welink-prefs:
