services:
  backend:
    image: ghcr.io/runzhliu/welink/backend:main
    build:
      context: ./backend
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    container_name: welink-backend
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./decrypted:/app/data
      - welink-prefs:/app/prefs
    environment:
      - GIN_MODE=release
      - PREFERENCES_PATH=/app/prefs/preferences.json

  frontend:
    image: ghcr.io/runzhliu/welink/frontend:main
    build: ./frontend
    container_name: welink-frontend
    ports:
      - "0.0.0.0:3418:80"
    depends_on:
      - backend

volumes:
  welink-prefs:
