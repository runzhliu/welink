services:
  backend:
    image: ghcr.io/runzhliu/welink/backend:main
    build: ./backend
    container_name: welink-backend-demo
    environment:
      - GIN_MODE=release
      - DEMO_MODE=true
      - DATA_DIR=/app/demo-data
      # 公有云部署时禁用 AI 配置（防止用户误填 API Key）
      # 本地 demo 默认不设置此项，AI 功能正常可用
      # - DEMO_DISABLE_AI=true

  frontend:
    image: ghcr.io/runzhliu/welink/frontend:main
    build: ./frontend
    container_name: welink-frontend-demo
    ports:
      - "127.0.0.1:3418:80"
    depends_on:
      - backend
