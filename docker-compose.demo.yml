services:
  backend:
    image: ghcr.io/runzhliu/welink/backend:main
    build: ./backend
    container_name: welink-backend-demo
    environment:
      - GIN_MODE=release
      - DEMO_MODE=true
      - DATA_DIR=/app/demo-data
      # Demo 默认锁定 AI 配置：AI 能力走预置 mock 数据（无需外部 API Key），
      # 也防止公有云部署被滥用填入 API Key。
      # 如需在 demo 里真实调 LLM，显式设置 DEMO_DISABLE_AI=false。
      # - DEMO_DISABLE_AI=false

  frontend:
    image: ghcr.io/runzhliu/welink/frontend:main
    build: ./frontend
    container_name: welink-frontend-demo
    ports:
      - "127.0.0.1:3418:80"
    depends_on:
      - backend
