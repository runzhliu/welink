version: 2

updates:
  # Go 后端依赖
  - package-ecosystem: "gomod"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "chore"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  # 前端 npm 依赖
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "chore"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  # 文档站 npm 依赖
  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "chore"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 3

  # GitHub Actions 版本更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
    open-pull-requests-limit: 5
