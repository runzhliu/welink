name: ✨ 功能建议
description: 想要一个新能力？或对现有功能有优化想法？
title: "[Feature] "
labels: ["feature", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        提建议之前可以先翻一下 [路线图](https://welink.click/roadmap) 看看是不是已在计划里。

  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题
      description: 不是功能描述，是场景。"我平时/想做 X，但 WeLink 现在没法 Y"
      placeholder: 例如："我想看我和每个同事的下班后聊天占比，判断我和谁在工作外也有交集"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你的想法
      description: 想成什么样？越具体越容易讨论
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案（可选）
      description: 有没有想过别的做法？为什么这个更好？

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - 个人 / 局部小优化
        - 某个功能模块的扩展
        - 全新主功能
        - 跨模块 / 架构级
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: 确认
      options:
        - label: 我搜过了 Issues 和 Discussions，没有重复
          required: true
