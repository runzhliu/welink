name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "版本号（如 v1.0.1），留空则用 dev-<sha>"
        required: false
  push:
    tags:
      - "v*"
    branches:
      - dev

permissions:
  contents: write

jobs:
  # ─── 创建 Release，写完整说明 ─────────────────────────────────────────────────
  prepare:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 确定版本号和发布类型
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/heads/dev ]]; then
            echo "tag=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "WeLink ${{ steps.version.outputs.tag }}"
          draft: ${{ steps.version.outputs.draft }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          body: |
            ## 更新内容

            ### ✨ 新功能

            **全局搜索增强**
            - 全局搜索现支持**群聊记录**，可通过 pill 按钮切换「私聊 / 群聊 / 全部」范围
            - 搜索结果点击任意消息，弹出**当天完整聊天记录**，自动定位并高亮目标消息，支持前后翻日
            - 联系人详情和群聊详情的「搜索记录」Tab 同样支持点击查看当天上下文

            **数据库 SQL 编辑器**
            - 数据库页面新增 SQL 编辑器，可直接对底层 SQLite 数据库执行 `SELECT / PRAGMA / EXPLAIN`
            - 支持 ⌘+Enter 快捷执行、Tab 缩进、结果一键复制（TSV 格式），最多返回 500 行

            **群聊画像**
            - 成员发言排行支持显示最多 Top 500，人数可实时修改
            - 名字列宽度可**拖拽调整**，设置页同步保存

            **Windows 支持**
            - 新增 Windows App 版本（基于 WebView2，无需 CGO）

            **官方网站**
            - 上线 [welink.click](https://welink.click)，含完整文档和 MCP Server 使用说明
            - 上线 [demo.welink.click](https://demo.welink.click) 在线体验
            - 侧边栏图标点击可直接跳转官网

            ### 🐛 修复

            - 搜索结果点击头像正确跳转联系人资料，过滤已屏蔽用户
            - 修复群聊详情页崩溃问题
            - 修复旧版 pip 不支持 `--break-system-packages` 导致 `make dmg` 失败

            ---

            ## macOS 安装方法

            1. 下载 `WeLink.dmg`，双击挂载
            2. 将 `WeLink.app` 拖入 `/Applications`
            3. 双击运行，首次会进入演示模式，无需任何配置即可体验功能
            4. 打开右上角「设置」，选择解密后的 `decrypted/` 目录路径，点击保存重启即可加载真实数据

            **首次打开提示"无法打开"？**

            macOS 对未经 Apple 公证的 App 会拦截，按以下任一方式解除：

            - **方式一（推荐）**：系统设置 → 隐私与安全性 → 拉到底部，点击「仍要打开」
            - **方式二**：右键点击 `WeLink.app` → 「打开」→ 再次点击「打开」
            - **方式三**（终端）：
              ```bash
              xattr -cr /Applications/WeLink.app
              ```

            ---

            ## Windows 安装方法

            1. 下载 `WeLink-windows-amd64.zip`，解压到任意目录
            2. 双击 `WeLink.exe` 运行，首次会进入演示模式，无需任何配置即可体验功能
            3. 打开右上角「设置」，选择解密后的 `decrypted\` 目录路径，点击保存重启即可加载真实数据

            > `decrypted\` 目录可放在任意位置，在设置页面选择路径即可，无需与 `WeLink.exe` 同目录。

            **系统要求**：Windows 10 1903 或更高版本

            **首次运行提示缺少 WebView2 Runtime？**

            Windows 11 及安装了 Edge 的 Windows 10 已自带，无需额外安装。
            如提示缺少运行时，请下载安装 Evergreen Bootstrapper（约 2 MB）：
            https://developer.microsoft.com/microsoft-edge/webview2/

            ---

            ## 文件校验

            下载后校验文件完整性：

            ```bash
            # macOS
            shasum -a 256 ~/Downloads/WeLink.dmg
            ```

            ```powershell
            # Windows
            Get-FileHash .\WeLink-windows-amd64.zip -Algorithm SHA256
            ```

            > COYG! 🔴⚪

  # ─── macOS DMG ──────────────────────────────────────────────────────────────
  build-dmg:
    name: macOS DMG
    needs: prepare
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build DMG
        run: make dmg

      - name: 计算 SHA256
        id: sha256
        run: |
          echo "sum=$(shasum -a 256 dist/WeLink.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: 上传 DMG 到 Release
        run: gh release upload ${{ needs.prepare.outputs.tag }} dist/WeLink.dmg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Windows EXE ────────────────────────────────────────────────────────────
  build-exe:
    name: Windows EXE
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install goversioninfo
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
        working-directory: backend

      - name: Build EXE
        run: make exe

      - name: 计算 SHA256
        id: sha256
        run: |
          echo "sum=$(sha256sum dist/WeLink-windows-amd64.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: 上传 EXE 到 Release
        run: gh release upload ${{ needs.prepare.outputs.tag }} dist/WeLink-windows-amd64.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
