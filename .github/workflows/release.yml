name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "版本号（如 v1.0.1），留空则用 dev-<sha>"
        required: false
  push:
    tags:
      - "v*"
    branches:
      - dev

permissions:
  contents: write

jobs:
  # ─── 创建 Release，写完整说明 ─────────────────────────────────────────────────
  prepare:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 确定版本号和发布类型
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/heads/dev ]]; then
            echo "tag=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 生成 Changelog
        id: changelog
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            COMMITS=$(git log ${PREV}..HEAD --pretty=format:"%s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"%s" --no-merges)
          fi

          FEAT="" FIX="" CHORE="" DOCS=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            case "$line" in
              feat:*|feat\(*) FEAT="$FEAT\n- ${line#*: }" ;;
              fix:*|fix\(*)   FIX="$FIX\n- ${line#*: }" ;;
              docs:*|doc:*)   DOCS="$DOCS\n- ${line#*: }" ;;
              chore:*|ci:*|refactor:*|perf:*|test:*) CHORE="$CHORE\n- ${line#*: }" ;;
              *)              CHORE="$CHORE\n- $line" ;;
            esac
          done <<< "$COMMITS"

          NOTES=""
          [ -n "$FEAT" ]  && NOTES="$NOTES\n## ✨ 新功能\n$FEAT\n"
          [ -n "$FIX" ]   && NOTES="$NOTES\n## 🐛 修复\n$FIX\n"
          [ -n "$DOCS" ]  && NOTES="$NOTES\n## 📖 文档\n$DOCS\n"
          [ -n "$CHORE" ] && NOTES="$NOTES\n## 🔧 工程\n$CHORE\n"

          printf "notes<<EOF\n" >> "$GITHUB_OUTPUT"
          printf "$NOTES\n" >> "$GITHUB_OUTPUT"
          printf "EOF\n" >> "$GITHUB_OUTPUT"

      - name: 创建 Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "WeLink ${{ steps.version.outputs.tag }}"
          draft: ${{ steps.version.outputs.draft }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          body: ${{ steps.changelog.outputs.notes }}

  # ─── macOS DMG ──────────────────────────────────────────────────────────────
  build-dmg:
    name: macOS DMG
    needs: prepare
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build DMG
        run: make dmg

      - name: 计算 SHA256
        id: sha256
        run: |
          echo "sum=$(shasum -a 256 dist/WeLink.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: 上传 DMG 到 Release
        run: gh release upload ${{ needs.prepare.outputs.tag }} dist/WeLink.dmg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Windows EXE ────────────────────────────────────────────────────────────
  build-exe:
    name: Windows EXE
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install goversioninfo
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
        working-directory: backend

      - name: Build EXE
        run: make exe

      - name: 计算 SHA256
        id: sha256
        run: |
          echo "sum=$(sha256sum dist/WeLink-windows-amd64.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: 上传 EXE 到 Release
        run: gh release upload ${{ needs.prepare.outputs.tag }} dist/WeLink-windows-amd64.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
