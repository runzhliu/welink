name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '✨ 新功能'
    labels:
      - 'feature'
      - 'feat'
      - 'enhancement'
  - title: '🐛 修复'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '🔧 工程 / 依赖'
    labels:
      - 'chore'
      - 'ci'
      - 'dependencies'
  - title: '📖 文档'
    labels:
      - 'docs'
      - 'documentation'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'breaking'
  minor:
    labels:
      - 'feature'
      - 'feat'
      - 'enhancement'
  patch:
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
      - 'chore'
      - 'ci'
      - 'docs'
      - 'dependencies'
  default: patch

template: |
  ## 更新内容

  $CHANGES

  ---

  ## macOS 安装方法

  1. 下载 `WeLink.dmg`，双击挂载
  2. 将 `WeLink.app` 拖入 `/Applications`
  3. 双击运行，首次会进入演示模式，无需任何配置即可体验功能
  4. 打开右上角「设置」，选择解密后的 `decrypted/` 目录路径，点击保存重启即可加载真实数据

  **首次打开提示"无法打开"？**

  - **方式一（推荐）**：系统设置 → 隐私与安全性 → 拉到底部，点击「仍要打开」
  - **方式二**：右键点击 `WeLink.app` → 「打开」→ 再次点击「打开」
  - **方式三**（终端）：`xattr -cr /Applications/WeLink.app`

  ---

  ## Windows 安装方法

  1. 下载 `WeLink-windows-amd64.zip`，解压到任意目录
  2. 双击 `WeLink.exe` 运行

  **系统要求**：Windows 10 1903 或更高版本

  > COYG! 🔴⚪
